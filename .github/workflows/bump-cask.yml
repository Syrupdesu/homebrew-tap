name: Bump All Casks in Tap

on:
  schedule:
    - cron: '0 0 * * *' # 每天运行
  workflow_dispatch: # 允许手动点击

jobs:
  bump-all:
    runs-on: macos-latest
    steps:
      - name: Bump all casks
        uses: Homebrew/actions/bump-packages@master
        with:
          token: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          tap: ${{ github.repository }} 
          livecheck: true