name: Auto Bump Casks

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - name: Configure Homebrew
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          brew tap Syrupdesu/homebrew-tap

      - name: Bump casks
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          casks=(kazumi voicevox)

          for cask in "${casks[@]}"; do
            echo "==> Checking $cask"
            brew bump-cask-pr \
              --tap Syrupdesu/homebrew-tap \
              --no-browse \
              "$cask" \
            || echo "⚠️  $cask: no update or error, skipping"
          done
