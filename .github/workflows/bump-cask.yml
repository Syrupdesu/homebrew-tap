name: Bump Cask

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  bump:
    name: Bump outdated casks
    runs-on: macos-latest
    steps:
      - name: Update Homebrew cask
        uses: macauley/action-homebrew-bump-cask@v1
        with:
          token: ${{ secrets.TOKEN }}
          tap: Syrupdesu/homebrew-tap
          cask: kazumi, piliplus, playcover-community@nightly
          livecheck: true