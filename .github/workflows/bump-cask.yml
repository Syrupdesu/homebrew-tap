name: Bump Cask

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  bump:
    name: Bump outdated casks
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Tap
        run: brew tap Syrupdesu/homebrew-tap

      - name: Bump outdated casks
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.TOKEN }}
        run: |
          for cask in kazumi piliplus "playcover-community@nightly"; do
            echo "Checking $cask..."
            brew livecheck --cask "Syrupdesu/homebrew-tap/$cask" --quiet --newer-only \
              | grep . && brew bump-cask-pr \
                --no-audit \
                --no-browse \
                --message="Bumped by GitHub Actions" \
                "Syrupdesu/homebrew-tap/$cask" \
              || echo "$cask is up to date"
          done