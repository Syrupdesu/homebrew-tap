name: Auto Bump Casks

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - name: Configure Homebrew
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          brew tap Syrupdesu/homebrew-tap

      - name: Bump casks
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          casks=(kazumi piliplus)

          for cask in "${casks[@]}"; do
            echo "==> Checking $cask"

            version=$(brew livecheck --cask --json "Syrupdesu/homebrew-tap/$cask" | tee /dev/stderr \
              | python3 -c "import sys,json; data=json.load(sys.stdin)[0]; print(data.get('version', {}).get('latest', ''))")

            if [ -z "$version" ]; then
              echo "⚠️  $cask: livecheck failed, skipping"
              continue
            fi

            echo "==> Latest version: $version"

            brew bump-cask-pr \
              --no-browse \
              --version "$version" \
              "Syrupdesu/homebrew-tap/$cask" \
            || echo "⚠️  $cask: bump failed or already up to date, skipping"
          done
          