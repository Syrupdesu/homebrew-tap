name: Auto Bump Casks

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - name: Configure Homebrew
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          brew tap Syrupdesu/homebrew-tap

      - name: Bump casks
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          casks=(kazumi piliplus voicevox playcover-community@nightly)

          for cask in "${casks[@]}"; do
            echo "==> Checking $cask"

            livecheck_json=$(brew livecheck --cask --json "Syrupdesu/homebrew-tap/$cask")

            outdated=$(echo "$livecheck_json" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['version']['outdated'])")

            if [ "$outdated" != "True" ]; then
              echo "==> $cask is up to date, skipping"
              continue
            fi

            version=$(echo "$livecheck_json" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['version']['latest'])")

            echo "==> Latest version: $version"

            brew bump-cask-pr \
              --no-browse \
              --version "$version" \
              "Syrupdesu/homebrew-tap/$cask" \
            || echo "⚠️  $cask: bump failed or already up to date, skipping"
          done
          